spring.application.name=ms-pedidos
server.port=8084

# CONFIGURACION MYSQL (BD propia para ms-pedidos)
spring.datasource.url=jdbc:mysql://localhost:3306/marfuego_pedidos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# LOGGING
logging.level.com.marfuego.ms_pedidos=DEBUG

# URLs de microservicios consumidos via WebClient (FASE 4)
ms.menu.base-url=http://localhost:8082
ms.inventario.base-url=http://localhost:8083
ms.caja.base-url=http://localhost:8085
ms.locales.base-url=http://localhost:8081
