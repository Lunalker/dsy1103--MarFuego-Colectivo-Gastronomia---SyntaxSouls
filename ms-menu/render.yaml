databases:
  - name: bd-menu
    databaseName: menudb
    user: menuuser
    plan: free
    region: oregon

services:
  - type: web
    name: ms-menu
    runtime: docker
    plan: free
    region: oregon

    dockerfilePath: ./Dockerfile

    envVars:
      - key: DB_HOST
        fromDatabase:
          name: bd-menu
          property: host

      - key: DB_PORT
        fromDatabase:
          name: bd-menu
          property: port

      - key: DB_NAME
        fromDatabase:
          name: bd-menu
          property: database

      - key: DB_USER
        fromDatabase:
          name: bd-menu
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: bd-menu
          property: password