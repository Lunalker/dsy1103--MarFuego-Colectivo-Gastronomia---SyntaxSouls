spring.application.name=ms-inventario
server.port=8083

# CONFIGURACION MYSQL (BD propia para ms-inventario)
spring.datasource.url=jdbc:mysql://localhost:3306/marfuego_inventario?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# LOGGING
logging.level.com.marfuego.ms_inventario=DEBUG
